cleo = "2.1.0"
click = "8.1.7"
colorama = "0.4.6"
crashtest = "0.4.1"
distlib = "0.3.9"
dulwich = "0.21.7"
fastjsonschema = "2.20.0"
filelock = "3.16.1"
greenlet = "3.1.1"
h11 = "0.14.0"
idna = "3.10"
installer = "0.7.0"
jaraco-classes = "3.4.0"
keyring = "24.3.1"
more-itertools = "10.5.0"
msgpack = "1.1.0"
pexpect = "4.9.0"
pkginfo = "1.11.2"
poetry = "1.8.4"
