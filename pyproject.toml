[tool.poetry]
name = "library"
version = "0.1.0"
description = "l1br@ry"
authors = ["0wo0w <you@example.com>"]
readme = "README.md"

[tool.ruff]
line-length = 100               # Максимальная длина строки
target-version = "py310"       # Целевая версия Python
fix = true                     # Разрешить автоматические исправления

# Выбираем правила из flake8, isort, mccabe, pyupgrade, black
select = [
  "E",    # pycodestyle (часть flake8)
  "F",    # pyflakes (часть flake8)
  "I",    # isort
  "C90",  # mccabe
  "UP",   # pyupgrade
  "B",    # flake8-bugbear (доп. анализ кода)
  "SIM",  # flake8-simplify (упрощения)
  "PYI",  # проверки типов .pyi
  "TID",  # tidy imports
  "PL",   # pylint совместимые проверки
  "RUF",  # собственные правила Ruff
]

# Упорядочивание импортов (аналог isort)
[tool.ruff.isort]
combine-as-imports = true
force-single-line = false
known-first-party = ["library"]  # Название твоего проекта (замени при необходимости)
lines-between-types = 1

# mccabe
[tool.ruff.mccabe]
max-complexity = 10

